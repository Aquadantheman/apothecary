        role: substrate
        significance: major
        evidence: established
    renal_excretion: true
    ph_dependent: false

  receptor_activity:
    - system: gabaergic
      mechanism: "Positive allosteric modulator of GABA-A receptors; enhances the effect of GABA, producing anxiolytic, sedative, and muscle relaxant effects"
      direction: increase
      magnitude: strong

  nutrient_effects:
    depletions: []
    requirements: []

  oxidative_profile:
    generates_ros: false

  absorption:
    enhancers: []
    inhibitors: []

  timing:
    optimal_window: null
    take_with_food: either
    notes: "Taken as needed or on a schedule per prescriber. Do not combine with alcohol or other CNS depressants."

  safety:
