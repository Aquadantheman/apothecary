# Alprazolam (Xanax)
# Source: FDA prescribing information, DrugBank DB00404
# Last reviewed: 2026-03-31

substance:
  id: alprazolam
  name: "Alprazolam (Xanax)"
  type: prescription
  category: benzodiazepine
  common_names:
    - Xanax
    - Xanax XR
    - alprazolam

  pharmacokinetics:
    formulations:
      - name: IR
        label: "Immediate Release"
        absorption_minutes: 15
        peak_plasma_hours: 1.5
        half_life_hours: 11
        duration_hours: 6
      - name: XR
        label: "Extended Release"
        absorption_minutes: 60
        peak_plasma_hours: 9
        half_life_hours: 11
        duration_hours: 24

  metabolism:
