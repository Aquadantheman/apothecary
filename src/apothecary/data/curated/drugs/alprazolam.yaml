    cardiovascular_flag: false
    appetite_suppression: false
    sleep_disruption: false
    tolerance_development: true
    contraindications:
      - "Alcohol (additive CNS depression — potentially fatal)"
      - "Opioids (additive respiratory depression — CRITICAL)"
      - "Ketoconazole, itraconazole (strong CYP3A4 inhibitors — raises alprazolam levels)"
