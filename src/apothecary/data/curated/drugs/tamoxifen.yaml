substance:
  id: tamoxifen
  name: "Tamoxifen (Nolvadex)"
  type: prescription
  category: serm
  common_names:
    - Tamoxifen
    - Nolvadex
    - Soltamox

  pharmacokinetics:
    formulations:
      - name: tablet
        label: "Oral Tablet"
        absorption_minutes: 60
        peak_plasma_hours: 5
        half_life_hours: 168
        duration_hours: 168

  metabolism:
    cyp450:
      - enzyme: CYP2D6
        role: substrate
        significance: major
        evidence: established
      - enzyme: CYP3A4
        role: substrate
        significance: minor
        evidence: established
    renal_excretion: false
    prodrug_activation:
      - CYP2D6
    notes: "CRITICAL PRODRUG: Tamoxifen is converted to its active metabolite endoxifen primarily by CYP2D6. CYP2D6 inhibitors (paroxetine, fluoxetine, bupropion, duloxetine) significantly reduce endoxifen levels and may compromise breast cancer treatment efficacy. CYP2D6 poor metabolizers also have reduced efficacy."

