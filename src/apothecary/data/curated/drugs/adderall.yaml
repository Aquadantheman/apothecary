# Adderall (Mixed Amphetamine Salts)
# Source: FDA prescribing information, DrugBank DB00182, PubMed
# Last reviewed: 2026-03-30

substance:
  id: adderall
  name: "Adderall (Mixed Amphetamine Salts)"
  type: prescription
  category: stimulant
  common_names:
    - Adderall
    - Adderall XR
    - mixed amphetamine salts
    - amphetamine/dextroamphetamine
    - MAS

  pharmacokinetics:
    formulations:
      - name: IR
        label: "Immediate Release"
        absorption_minutes: 30
        peak_plasma_hours: 3
        half_life_hours: 10
        duration_hours: 6
      - name: XR
        label: "Extended Release"
        absorption_minutes: 60
        peak_plasma_hours: 7
        half_life_hours: 11
        duration_hours: 12
    food_effect: "High-fat meals may delay Tmax by ~2.5 hours (XR)"
    ph_sensitivity: "Alkaline urine decreases renal excretion; acidic urine increases it"

  metabolism:
    cyp450:
      - enzyme: CYP2D6
        role: substrate
        significance: major
        evidence: established
    renal_excretion: true
    ph_dependent: true

  receptor_activity:
    - system: dopaminergic
      mechanism: "Reverses dopamine transporter (DAT), pumping dopamine into synapse; blocks reuptake; promotes vesicular release"
      direction: increase
      magnitude: strong
    - system: noradrenergic
      mechanism: "Reverses norepinephrine transporter (NET), increasing synaptic norepinephrine"
      direction: increase
      magnitude: strong
    - system: serotonergic
      mechanism: "Mild serotonin release at therapeutic doses"
      direction: increase
      magnitude: mild

  nutrient_effects:
    depletions:
      - nutrient: magnesium
        mechanism: "Increased urinary magnesium excretion"
        evidence: probable
        clinical_significance: moderate
      - nutrient: vitamin_c
        mechanism: "Increased utilization under oxidative stress from dopamine metabolism"
        evidence: theoretical
        clinical_significance: low
    requirements:
      - nutrient: tyrosine
        mechanism: "Precursor for dopamine synthesis; demand increased under stimulant-driven release"
        evidence: established
      - nutrient: phenylalanine
        mechanism: "Upstream precursor to tyrosine"
        evidence: established

  oxidative_profile:
    generates_ros: true
    mechanism: "Dopamine auto-oxidation produces reactive quinones; MAO-mediated metabolism produces hydrogen peroxide; glutamate excitotoxicity via NMDA activation"
    mitochondrial_impact: "May impair mitochondrial complex I function with chronic use"
    neuroinflammation: "Microglial activation documented at high/abuse doses in animal models"
    evidence: "Established at abuse doses (animal); probable at therapeutic doses (extrapolated)"

  absorption:
    enhancers:
      - substance_id: antacids
        mechanism: "Alkalinizes GI tract, may increase absorption"
        net_effect: increases_effect
    inhibitors:
      - substance_id: vitamin_c
        mechanism: "Acidifies urine, accelerating renal excretion"
        net_effect: decreases_duration
      - substance_id: magnesium
        mechanism: "May affect absorption if co-administered"
        net_effect: decreases_effect
        timing_note: "Separate by 8+ hours; evening magnesium avoids interference"

  timing:
    optimal_window: morning
    take_with_food: recommended
    latest_recommended:
      IR: "12:00"
      XR: "10:00"
    spacing_requirements:
      - substance_tag: alkalinizing
        rule: avoid_concurrent
        reason: "Slows amphetamine excretion, prolonging duration and side effects"
      - substance_tag: magnesium
        rule: separate_8h
        reason: "Potential absorption interference; evening dosing resolves this"
      - substance_tag: acidifying
        rule: caution
        reason: "May reduce efficacy by accelerating excretion"

  safety:
    serotonin_load: 0.2
    cardiovascular_flag: true
    appetite_suppression: true
    sleep_disruption: true
    tolerance_development: true
    contraindications:
      - "MAO inhibitors (hypertensive crisis — CRITICAL)"
      - "Severe cardiovascular disease"
      - "Hyperthyroidism"
      - "Glaucoma"
      - "History of substance abuse (relative)"

  metadata:
    data_sources:
      - "FDA: Adderall XR Prescribing Information"
      - "DrugBank: DB00182"
      - "PubMed PMID:16808729 (Amphetamine neurotoxicity and oxidative stress)"
      - "PubMed PMID:11198300 (Mitochondrial dysfunction and dopamine oxidative stress)"
    last_reviewed: "2026-03-30"
    review_status: curated
